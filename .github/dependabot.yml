version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Zurich
    cooldown:
      default-days: 14
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /web/frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Zurich
    cooldown:
      default-days: 14
    labels:
      - dependencies
      - frontend
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    groups:
      npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Zurich
    cooldown:
      default-days: 14
    labels:
      - dependencies
      - python
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        dependency-type: production
        update-types:
          - minor
          - patch
      python-development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Europe/Zurich
    cooldown:
      default-days: 14
    labels:
      - dependencies
      - docker
    open-pull-requests-limit: 5
