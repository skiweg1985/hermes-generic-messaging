version: 1
disable_existing_loggers: false
formatters:
  default:
    format: "%(asctime)s %(levelname)s [%(name)s] %(message)s"
handlers:
  default:
    class: logging.StreamHandler
    stream: ext://sys.stderr
    formatter: default
loggers:
  uvicorn:
    level: INFO
    handlers: [default]
    propagate: false
  uvicorn.error:
    level: INFO
    handlers: [default]
    propagate: false
  uvicorn.access:
    level: INFO
    handlers: [default]
    propagate: false
  app:
    level: DEBUG
    handlers: [default]
    propagate: false
root:
  level: WARNING
  handlers: [default]
