name: custom_chat-platform
label: Custom Chat
kind: platform
version: 1.0.0
description: >
  Universal WebSocket messaging adapter for Hermes Agent.
  Speaks Event Schema v1 for text, streaming, slash commands, and audio.
author: Hermes Generic Messaging
requires_env:
  - name: CUSTOM_CHAT_BEARER_TOKEN
    description: "Bearer token clients must send on WebSocket upgrade"
    prompt: "Bearer token"
    password: true
optional_env:
  - name: CUSTOM_CHAT_WS_HOST
    description: "WebSocket bind host (default 0.0.0.0)"
    prompt: "Bind host"
    password: false
  - name: CUSTOM_CHAT_WS_PORT
    description: "WebSocket bind port (default 8765)"
    prompt: "Bind port"
    password: false
  - name: CUSTOM_CHAT_ALLOWED_USERS
    description: "Comma-separated user IDs allowed to interact"
    prompt: "Allowed users"
    password: false
  - name: CUSTOM_CHAT_ALLOW_ALL_USERS
    description: "Set to true to skip user allowlist (open access)"
    prompt: "Allow all users"
    password: false
  - name: CUSTOM_CHAT_HOME_CHANNEL
    description: "Default chat_id for cron-delivered messages"
    prompt: "Home channel chat_id"
    password: false
  - name: CUSTOM_CHAT_HOME_CHANNEL_NAME
    description: "Human-readable name for the home channel"
    prompt: "Home channel name"
    password: false
  - name: CUSTOM_CHAT_TTS_RESPONSE_FORMAT
    description: "Optional TTS response format override for audio_response (e.g. pcm, mp3, opus, wav, flac)"
    prompt: "TTS response format"
    password: false
  - name: CUSTOM_CHAT_TTS_TIMEOUT_SECONDS
    description: "Maximum seconds to wait for Hermes TTS during audio_response"
    prompt: "TTS timeout seconds"
    password: false
  - name: CUSTOM_CHAT_MAX_UPLOAD_BYTES
    description: "Maximum inbound attachment size in bytes"
    prompt: "Max upload bytes"
    password: false
  - name: CUSTOM_CHAT_ALLOWED_UPLOAD_MIME_TYPES
    description: "Comma-separated MIME allowlist for inbound attachments"
    prompt: "Allowed upload MIME types"
    password: false
